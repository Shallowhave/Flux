#!/system/bin/sh

# ==============================================================================
#                           Flux Settings Configuration
# ==============================================================================
# Note: Restart service after modifying this file
# Usage: These settings override internal defaults
# ==============================================================================

# ==============================================================================
# [ Updater Configuration ]
# ==============================================================================

# Subscription URL (sing-box compatible)
SUBSCRIPTION_URL=""

# Subscription download timeout (seconds)
UPDATE_TIMEOUT=5

# Download retry count
RETRY_COUNT=2

# Auto-update interval (seconds, 86400=24h, 0=Disable)
UPDATE_INTERVAL=86400

# Cleanup Emoji from node names (0: Keep, 1: Remove)
PREF_CLEANUP_EMOJI=1

# ==============================================================================
# [ Logging & Debugging ]
# ==============================================================================

# 0=OFF, 1=Error, 2=Warn, 3=Info, 4=Debug
LOG_LEVEL=3

# Max log size before rotation (bytes)
LOG_MAX_SIZE=1048576

# ==============================================================================
# [ Core Process ]
# ==============================================================================

# Execution user/group for sing-box.
# WARNING: changing these requires sing-box to actually run as that uid/gid
# (the init script does not enforce it). The loopback REJECT rule at
# scripts/rules:_build_loopback_rules matches on these names — a mismatch
# silently breaks the loopback guard against accidental proxy-to-self loops.
CORE_USER="root"
CORE_GROUP="root"

# Core startup timeout (seconds)
CORE_TIMEOUT=5

# ==============================================================================
# [ Network Interfaces ]
# ==============================================================================

# Interface names (Support wildcard +)
MOBILE_INTERFACE="rmnet_data+"
WIFI_INTERFACE="wlan0"
# Hotspot interface — leave empty if your device has no dedicated hotspot
# interface. Example values: HOTSPOT_INTERFACE="wlan2" (some Samsung), "ap0".
HOTSPOT_INTERFACE=""
USB_INTERFACE="rndis+"

# ==============================================================================
# [ Proxy Granularity ]
# ==============================================================================

# Interface switches (0=Bypass, 1=Proxy)
PROXY_MOBILE=1
PROXY_WIFI=1
PROXY_HOTSPOT=1
PROXY_USB=1

# IPv6 family activation (0=IPv4 only, 1=IPv4+IPv6)
# Disabled by default because many carrier networks have broken IPv6
# routing or NAT64; enable if your network has working IPv6.
PROXY_IPV6=0

# Proxy mode: tproxy=netfilter TPROXY (default), tun=sing-box TUN inbound (opt-in)
PROXY_MODE="tproxy"

# ----- TUN mode -----
# The following four knobs are read ONLY when PROXY_MODE=tun.
# They are inert in tproxy mode.
TUN_INTERFACE="tun0"
TUN_INET4_ADDRESS="172.19.0.1/30"
TUN_INET6_ADDRESS="fdfe:dcba:9876::1/126"
TUN_MTU=9000

# ==============================================================================
# [ Routing Mark ]
# ==============================================================================

# Core/Bypass Routing Mark (empty=use UID owner match)
ROUTING_MARK=""

# ==============================================================================
# [ Application Filtering ]
# ==============================================================================

# 0=Disable, 1=Blacklist (bypass specified apps), 2=Whitelist (proxy only specified apps)
APP_PROXY_MODE=0

# Package names - supports multi-line values in quotes
# Example (newlines INSIDE quotes):
# APP_LIST="com.google.android.youtube
# com.twitter.android
# com.instagram.android"
APP_LIST=""

# Android multi-user app UID scope: owner=user 0, all=user 0..99, list=APP_USER_LIST
APP_USER_SCOPE="owner"
APP_USER_LIST="0"

# ==============================================================================
# [ Performance & Compatibility ]
# ==============================================================================

# Advanced: TCP MSS Clamping to fix carrier network connectivity: 0=Disable, 1=Enable
MSS_CLAMP_ENABLE=1

# Optional: block UDP/443 QUIC to force HTTP/3 fallback: 0=Disable, 1=Enable
BLOCK_QUIC=0

# Connmark mask. Low byte keeps Flux marks away from vendor QoS high bits.
MARK_MASK=0xff

# Fast path: skip rule traversal for already-tracked proxied connections
# via xt_socket + connmark match. Requires KFEAT_SOCKET=1 (kernel 3.10+,
# universal on Android). Safe to enable; falls back transparently if the
# kernel reports KFEAT_SOCKET=0. See scripts/rules:_build_divert_rules.
PERFORMANCE_MODE=0

# Runtime probe for xt_socket UDP --transparent support.
# auto  (default): enable on kernel >= 4.19 AND KFEAT_SOCKET=1
# off            : force KFEAT_SOCKET_UDP=0 (current pre-P4a behavior)
# on             : force KFEAT_SOCKET_UDP=1 (use only if you have verified
#                  your vendor kernel works; misbehaving kernels will fail
#                  at iptables-restore time)
SOCKET_UDP_PROBE="auto"

# Optional compatibility profiles. Disabled by default to avoid system-wide surprises.
# PRIVATE_DNS_GUARD modes:
#   off / 0    : Never touch Private DNS (default).
#   strict / 1 : Always force private_dns_mode=off (legacy =1 behavior).
#   auto       : Cooperative — only override when sing-box's DNS plane would
#                actually conflict. Specifically, in tproxy mode override only
#                when current mode is "hostname" (strict DoT bypasses sing-box);
#                in TUN mode never override (sing-box's TUN inbound owns DNS).
PRIVATE_DNS_GUARD=0
# WARNING: setting this to 1 writes /proc/sys/net/ipv6/conf/all/disable_ipv6=1,
# which disables IPv6 system-wide — every app on the device is affected, not
# just proxied traffic. Restored on dispatcher stop.
IPV6_FORCE_DISABLE=0
# Set net.ipv4.ip_forward=1 (and IPv6 equivalent when PROXY_IPV6=1) for
# tethering-share scenarios where the upstream rejects un-forwarded packets.
# Affects system-wide forwarding state; restored on dispatcher stop.
HOTSPOT_FIX=0

# Localhost-redirect compatibility. When 1, sets
# net.ipv4.conf.all.route_localnet=1 so packets destined for 127.0.0.0/8
# can be redirected to TPROXY via DNAT. Only useful when debugging
# localhost-routed flows; most setups don't need it. Snapshot+restored
# on dispatcher stop.
# REF: https://www.kernel.org/doc/Documentation/networking/ip-sysctl.rst
LOCALNET_FIX=0

# Conntrack tuning. These write to /proc/sys/net/netfilter/* which is kernel
# state shared with vendor netd; values are snapshotted on start and restored
# on dispatcher stop. Empty (default) = do not touch, byte-identical to legacy.
# REF: https://www.kernel.org/doc/Documentation/networking/nf_conntrack-sysctl.rst
CONNTRACK_MAX=""
CONNTRACK_UDP_STREAM_TIMEOUT=""
CONNTRACK_TCP_CLOSE_WAIT_TIMEOUT=""

# Socket buffer ceiling. Writes the same value to BOTH net.core.rmem_max and
# net.core.wmem_max — these are *ceilings* that cap what SO_{RCV,SND}BUF can
# request, not the actual buffer size. Heavy WebRTC/QUIC inbound benefits
# from raising the default. Typical 4194304 (4 MiB), heavy 16777216 (16 MiB).
# Empty (default) = do not touch, byte-identical to legacy.
# REF: https://www.kernel.org/doc/Documentation/admin-guide/sysctl/net.rst
# REF: https://wiki.metacubex.one/config/inbounds/tproxy/
SOCKET_BUFFER_MAX=""

# List of interfaces to EXPLICITLY ignore (Space-separated, OUTPUT chain)
# These interfaces will bypass proxy even if enabled above
# Example: EXCLUDE_INTERFACES="rmnet_data1 rmnet_data8"
# Note: trailing '+' is iptables(8) wildcard syntax; 'wg+' matches all
# WireGuard interfaces (wg0, wg-mullvad, amneziawg-*, etc.)
EXCLUDE_INTERFACES="wg+"

# ==============================================================================
# [ Advanced Updater Filtering ]
# ==============================================================================

# Regex patterns for nodes to EXCLUDE (matched against tag/remarks)
# Example: UPDATER_EXCLUDE_REMARKS="(expire|traffic)"
UPDATER_EXCLUDE_REMARKS="(expire|traffic|官网|到期|流量|剩余|套餐|重置|联系|群组|通知|平台|网站|时间|建议|反馈|版本|更新)"

# Custom Rename Rules (JSON format)
# Example: UPDATER_RENAME_RULES='[{"match":"HK","replace":"Hong Kong"}]'
UPDATER_RENAME_RULES='[
    {"match":"【(亚洲|北美洲|欧洲|南美洲|非洲|大洋洲|南极洲)】","replace":""},
    {"match":"【","replace":"["},
    {"match":"】","replace":"]"}
]'

# Max length for node tags (default: 32)
UPDATER_MAX_TAG_LENGTH=32
